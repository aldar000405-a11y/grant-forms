<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grant Portal - Clarification Responses</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%); }
    .glass-effect { backdrop-filter: blur(10px); background: rgba(255,255,255,0.95); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    .question-card { transition: all 0.3s ease; }
    .question-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.15); }
    textarea:focus { transform: scale(1.01); }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-4xl glass-effect rounded-2xl shadow-2xl overflow-hidden border border-white/50">

  <!-- Header -->
  <div class="gradient-bg px-8 py-8 text-center relative overflow-hidden">
    <div class="absolute inset-0 bg-white/10 transform -skew-y-3"></div>
    <div class="relative z-10">
      <h1 class="text-2xl font-bold text-white mb-2">Clarification Questions</h1>
      <p class="text-blue-100 text-sm">
        Round <span id="roundNum" class="font-bold bg-white/20 px-2 py-1 rounded">1</span> - Application ID <span id="appIdDisplay" class="font-mono bg-white/20 px-2 py-1 rounded"></span>
      </p>
    </div>
  </div>

  <div class="p-8">

    <!-- Loading -->
    <div id="loading" class="text-center py-16">
      <div class="relative w-16 h-16 mx-auto mb-6">
        <div class="absolute inset-0 border-4 border-blue-200 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
      </div>
      <p class="text-slate-500 font-medium">Loading questions...</p>
      <p class="text-slate-400 text-xs mt-2">Please wait</p>
    </div>

    <!-- Load Error -->
    <div id="loadError" class="hidden bg-red-50 border-2 border-red-200 rounded-2xl p-8 text-center animate-fade-in">
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h3 class="text-xl font-bold text-red-800 mb-2">Failed to Load Questions</h3>
      <p id="loadErrorMsg" class="text-red-600 mb-6"></p>
      <div class="flex gap-3 justify-center">
        <button onclick="location.reload()" class="px-6 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition font-bold shadow-lg">
          Try Again
        </button>
        <button onclick="window.history.back()" class="px-6 py-3 bg-slate-200 text-slate-700 rounded-xl hover:bg-slate-300 transition font-bold">
          Back
        </button>
      </div>
    </div>

    <!-- Main Form -->
    <form id="clarificationForm" class="hidden space-y-6">

      <!-- Info Banner -->
      <div class="bg-gradient-to-r from-amber-50 to-orange-50 border-2 border-amber-200 rounded-xl p-5 flex items-start gap-3">
        <div class="flex-shrink-0 w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">
          <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <div>
          <h4 class="font-bold text-amber-800 mb-1">Important Instructions</h4>
          <p class="text-amber-700 text-sm leading-relaxed">
            Please answer <strong>all</strong> questions in detail. Your answers directly affect the final evaluation.
            <span class="block mt-1 text-amber-600">Minimum 30 characters per answer.</span>
          </p>
        </div>
      </div>

      <input type="hidden" name="application_id" id="appIdInput">
      <input type="hidden" name="clarification_round" id="roundInput">

      <!-- Progress Bar -->
      <div class="bg-slate-100 rounded-full h-2 overflow-hidden">
        <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>
      <p class="text-xs text-slate-400 text-center" id="progressText">Answered 0 of 0 questions</p>

      <div id="questionsContainer" class="space-y-6"></div>

      <!-- Inline Message — always show dynamic response -->
      <div id="inlineMessage" class="hidden rounded-xl p-5 border-2 animate-fade-in" aria-live="assertive" role="alert">
        <div class="text-center">
          <div id="inlineIcon" class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-3 shadow"></div>
          <h3 id="inlineTitle" class="text-xl font-bold text-slate-800 mb-2"></h3>
          <p id="inlineBody" class="text-sm text-slate-600 mb-3"></p>
          <div id="inlineDetails" class="hidden text-left bg-white/70 rounded-lg p-3 border border-slate-200/60 mb-3"></div>
          <div id="inlineNextSteps" class="hidden text-left bg-amber-50 border border-amber-200 rounded-lg p-2 mb-3"></div>
          <div id="inlineActions" class="flex gap-3 justify-center flex-wrap"></div>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submitBtn"
        class="w-full gradient-bg text-white font-bold py-3 rounded-xl hover:opacity-90 transition flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg transform hover:scale-[1.02]">
        <span id="btnText">Submit Answers</span>
        <svg id="spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </button>
    </form>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const PROXY_BASE = 'https://grant-n8n-proxy.mohummadsultan0.workers.dev';
const REQUEST_TIMEOUT = 120000;
const MAX_RETRIES = 2;
const MIN_ANSWER_LENGTH = 30;



function getResponseData(data) {
  if (!data || typeof data !== 'object') return {};
  const merged = { ...data };
  const nested = [data.data, data.result, data.json, data.payload].filter(v => v && typeof v === 'object' && !Array.isArray(v));
  nested.forEach(source => {
    Object.keys(source).forEach(key => {
      if (merged[key] === undefined) merged[key] = source[key];
    });
  });
  return merged;
}

function getPrimaryMessage(data, fallback) {
  const source = getResponseData(data);
  const message = source.message || source.reason || source.next_steps || source.status || source.error_code;
  return message || fallback;
}

function getDetailSource(data) {
  const base = getResponseData(data);
  if (base.ui && typeof base.ui === 'object') delete base.ui;
  return base;
}

// ═══════════════════════════════════════════════════════
// ERROR REPORTING
// ═══════════════════════════════════════════════════════
const ERROR_WEBHOOK = `${PROXY_BASE}/error-report-x7k9m2p-2026`;

async function reportError(errorType, errorMessage, details = {}) {
  try {
    const payload = {
      error_message: errorMessage,
      error_description: details.description || '',
      node_name: 'Frontend_' + (errorType || 'UNKNOWN'),
      workflow_name: 'Grant Application Portal',
      node_type: 'browser',
      user_email: details.email || document.querySelector('[name="email"]')?.value || 'Unknown',
      application_id: details.applicationId || 'N/A',
      request_url: window.location.href,
      request_method: 'CLIENT_ERROR',
      request_payload: details,
      environment: 'production'
    };

    const res = await fetch(WEBHOOK_URL, {
method: 'POST',
headers: {
'Content-Type': 'application/json'
},
body: JSON.stringify(payload),
signal: controller.signal
});

    if (!res.ok) {
      console.error('Error webhook failed:', res.status);
    }
  } catch (e) {
    console.error('Failed to report error:', e);
  }
}

function detectAIError(response) {
  if (response.status === 429 || response.status === 403) {
    reportError('AI_SERVICE', 'AI API quota exceeded or rate limited', {
      description: 'Gemini API returned ' + response.status,
      status: response.status
    });
    return true;
  }
  if (response.status >= 500 && response.status < 600) {
    reportError('AI_SERVICE', 'AI service unavailable', {
      description: 'Gemini server error: ' + response.status
    });
    return true;
  }
  return false;
}

window.addEventListener('error', function(event) {
  reportError('UNKNOWN', event.message, {
    description: event.filename + ':' + event.lineno,
    stack: event.error?.stack
  });
});

window.addEventListener('unhandledrejection', function(event) {
  reportError('UNKNOWN', 'Unhandled Promise Rejection', {
    description: event.reason?.message || String(event.reason),
    stack: event.reason?.stack
  });
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const appId = params.get('application_id') || params.get('id') || localStorage.getItem('grantApplicationId') || 'UNKNOWN';
const round = params.get('round') || '1';

document.getElementById('appIdDisplay').textContent = appId;
document.getElementById('roundNum').textContent = round;
document.getElementById('appIdInput').value = appId;
document.getElementById('roundInput').value = round;

const QUESTIONS_URL = `${PROXY_BASE}/questions?id=${encodeURIComponent(appId)}`;
const SUBMIT_URL = `${PROXY_BASE}/clarify-x7k9m2p-2026`;

let questionsList = [];
let answersData = {};

// ═══════════════════════════════════════════════════════
// LOAD QUESTIONS
// ═══════════════════════════════════════════════════════
async function loadQuestions() {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT);

    const res = await fetch(QUESTIONS_URL, {
      method: 'GET',
      headers: {
        'Accept': 'application/json',
        'X-Webhook-Secret': WEBHOOK_SECRET
      },
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!res.ok) {
      const body = await res.text();
      throw new Error('Server ' + res.status + ': ' + body.substring(0, 120));
    }

    const data = await res.json();
    let raw = extractQuestions(data);
    questionsList = Array.isArray(raw) ? raw : [];

    if (!questionsList || questionsList.length === 0) {
      showNoQuestions();
      return;
    }

    renderQuestions();
    updateProgress();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('clarificationForm').classList.remove('hidden');

  } catch (err) {
    reportError('LOAD', 'Failed to load questions', {
      description: err.message || 'Load error',
      applicationId: appId,
      stack: err.stack
    });
    console.error('Load error:', err);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('loadError').classList.remove('hidden');

    let msg = err.message || 'Unable to load questions.';
    if (err.name === 'AbortError') {
      msg = 'Request timed out. The server is taking too long.';
    } else if (err.name === 'TypeError') {
      msg = 'Cannot connect to server. Please check your internet connection.';
    }

    document.getElementById('loadErrorMsg').textContent = msg;
  }
}

function extractQuestions(data) {
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.questions)) return data.questions;
  if (data.json && Array.isArray(data.json.questions)) return data.json.questions;
  if (Array.isArray(data.clarification_questions)) return data.clarification_questions;
  if (data.json && Array.isArray(data.json.clarification_questions)) return data.json.clarification_questions;

  if (typeof data === 'string') {
    try { 
      const parsed = JSON.parse(data);
      return extractQuestions(parsed);
    } catch(e) { return []; }
  }

  if (data && !Array.isArray(data) && Array.isArray(data.questions)) return data.questions;
  return [];
}

// ═══════════════════════════════════════════════════════
// RENDER QUESTIONS
// ═══════════════════════════════════════════════════════
function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  questionsList.forEach((q, i) => {
    const text = typeof q === 'string' ? q : (q.question || q.text || JSON.stringify(q));
    const div = document.createElement('div');
    div.className = 'question-card bg-white border-2 border-slate-100 rounded-2xl p-6 space-y-4 shadow-sm';
    div.innerHTML = `
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-xl flex items-center justify-center text-lg font-bold shadow-lg">
          ${i + 1}
        </div>
        <div class="flex-1 pt-2">
          <p class="text-slate-800 font-bold text-lg leading-relaxed">${escHtml(text)}</p>
          <p class="text-slate-400 text-xs mt-1">At least ${MIN_ANSWER_LENGTH} characters</p>
        </div>
      </div>
      <div class="relative">
        <textarea
          name="answer_${i}"
          data-question="${escHtml(text)}"
          data-index="${i}"
          required
          rows="5"
          class="w-full px-5 py-4 border-2 border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none text-slate-700 bg-slate-50/50 text-left transition-all duration-300"
          placeholder="Type your detailed answer here..."
        ></textarea>
        <div class="absolute bottom-3 left-3 text-xs text-slate-400">
          <span class="char-count">0</span> chars
        </div>
      </div>
      <div class="validation-msg hidden text-red-500 text-sm flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        Answer is too short
      </div>
    `;
    container.appendChild(div);
  });

  document.querySelectorAll('textarea[data-index]').forEach(ta => {
    ta.addEventListener('input', function() {
      const index = this.getAttribute('data-index');
      const length = this.value.trim().length;
      const card = this.closest('.question-card');
      const charCount = card.querySelector('.char-count');
      const validationMsg = card.querySelector('.validation-msg');

      charCount.textContent = length;

      if (length >= MIN_ANSWER_LENGTH) {
        charCount.classList.add('text-emerald-600');
        charCount.classList.remove('text-red-500');
        validationMsg.classList.add('hidden');
        this.classList.remove('border-red-300');
        this.classList.add('border-slate-200');
      } else {
        charCount.classList.add('text-red-500');
        charCount.classList.remove('text-emerald-600');
      }

      answersData[index] = this.value.trim();
      updateProgress();
    });
  });

  // ─── save on every input ───
  document.querySelectorAll('textarea[data-index]').forEach(ta => {
    ta.addEventListener('input', debounceSave);
  });

  let saveTimer;
  function debounceSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      const answers = [];
      document.querySelectorAll('textarea[data-index]').forEach((ta, i) => {
        answers.push({
          question: ta.getAttribute('data-question') || `Question ${i + 1}`,
          answer: ta.value
        });
      });
      localStorage.setItem(`clarification_${appId}`, JSON.stringify({
        answers,
        savedAt: new Date().toISOString()
      }));
    }, 300);
  }

  // ─── restore saved answers ───
  const saved = localStorage.getItem(`clarification_${appId}`);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed.answers) {
        parsed.answers.forEach((a, i) => {
          const ta = document.querySelector(`textarea[data-index="${i}"]`);
          if (ta) { ta.value = a.answer || ''; ta.dispatchEvent(new Event('input')); }
        });
      }
    } catch(e) {}
  }
}

function updateProgress() {
  const total = questionsList.length;
  const answered = Object.values(answersData).filter(a => a.length >= MIN_ANSWER_LENGTH).length;
  const percent = total > 0 ? (answered / total) * 100 : 0;

  document.getElementById('progressBar').style.width = percent + '%';
  document.getElementById('progressText').textContent = `Answered ${answered} of ${total} questions`;
}

function showNoQuestions() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('clarificationForm').classList.remove('hidden');
  document.getElementById('submitBtn').classList.add('hidden');
  document.getElementById('questionsContainer').innerHTML = `
    <div class="bg-amber-50 border-2 border-amber-200 rounded-2xl p-8 text-center animate-fade-in">
      <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h3 class="text-xl font-bold text-amber-800 mb-2">Questions Not Available</h3>
      <p class="text-amber-700">No clarification questions were found for this application. This may mean your application has already been processed, or the questions are not yet available. Please check your email or contact support.</p>
    </div>`;
}


// ═══════════════════════════════════════════════════════
function renderUiBlock(ui) {
  const variants = {
    success:  { card: 'bg-emerald-50 border-emerald-200', icon: '<svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>', titleColor: 'text-emerald-800', bodyColor: 'text-emerald-700' },
    error:    { card: 'bg-red-50 border-red-200',     icon: '<svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>', titleColor: 'text-red-800', bodyColor: 'text-red-700' },
    warning:  { card: 'bg-amber-50 border-amber-200', icon: '<svg class="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>', titleColor: 'text-amber-800', bodyColor: 'text-amber-700' },
    info:     { card: 'bg-blue-50 border-blue-200',   icon: '<svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>', titleColor: 'text-blue-800', bodyColor: 'text-blue-700' },
    blocked:  { card: 'bg-red-900 border-red-700',    icon: '<svg class="w-10 h-10 text-red-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636L5.636 18.364M6.343 6.343a8 8 0 1111.314 11.314A8 8 0 016.343 6.343z"></path></svg>', titleColor: 'text-red-100', bodyColor: 'text-red-200' }
  };

  const v = variants[ui.variant] || variants.info;

  let detailsHtml = '';
  if (ui.details && typeof ui.details === 'object') {
    const entries = Array.isArray(ui.details) 
      ? ui.details
      : Object.entries(ui.details).map(([k, v]) => ({ label: k.replace(/_/g, ' '), value: v }));
    
    detailsHtml = entries.map(({ label, value }) => `
      <div class="flex justify-between border-b border-slate-100 py-2 last:border-0">
        <span class="text-slate-500 text-sm">${escHtml(String(label))}</span>
        <span class="text-slate-700 text-sm font-mono text-right">${escHtml(String(value ?? ''))}</span>
      </div>`).join('');
  }

  let actionsHtml = '';
  if (Array.isArray(ui.actions)) {
    actionsHtml = ui.actions.map(action => {
      const styleMap = {
        primary:   'bg-blue-600 hover:bg-blue-700 text-white',
        success:   'bg-emerald-600 hover:bg-emerald-700 text-white',
        danger:    'bg-red-600 hover:bg-red-700 text-white',
        warning:   'bg-amber-500 hover:bg-amber-600 text-white',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-700'
      };
      const cls = styleMap[action.style] || styleMap.primary;
      const onclick = action.url 
        ? `window.location.href='${escHtml(action.url)}'`
        : action.reload 
          ? 'window.location.reload()'
          : action.close
            ? 'window.close()'
            : '';
      return `<button onclick="${onclick}" class="px-5 py-2 rounded-xl font-bold text-sm transition shadow ${cls}">${escHtml(action.label)}</button>`;
    }).join('');
  }

  return `
    <div class="${v.card} border-2 rounded-xl p-6">
      <div class="flex items-start gap-3">
        <div class="flex-shrink-0 w-12 h-12 rounded-full bg-white/80 flex items-center justify-center shadow">
          ${v.icon}
        </div>
        <div class="flex-1 min-w-0">
          <h4 class="font-bold text-base ${v.titleColor}">${escHtml(ui.title || '')}</h4>
          <p class="text-sm mt-1 ${v.bodyColor}">${escHtml(ui.message || '')}</p>
          ${detailsHtml ? `<div class="mt-3 bg-white/70 rounded-lg p-3 border border-slate-200/60">${detailsHtml}</div>` : ''}
          ${ui.note ? `<div class="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-3"><p class="text-amber-700 text-sm">${escHtml(ui.note)}</p></div>` : ''}
          ${actionsHtml ? `<div class="mt-3 flex gap-2 flex-wrap">${actionsHtml}</div>` : ''}
        </div>
      </div>
    </div>`;
}
// ═══════════════════════════════════════════════════════
// RENDER RESPONSE — always show dynamic response
// ═══════════════════════════════════════════════════════
function renderResponse(data) {
  const box = document.getElementById('inlineMessage');
  const icon = document.getElementById('inlineIcon');
  const title = document.getElementById('inlineTitle');
  const body = document.getElementById('inlineBody');
  const details = document.getElementById('inlineDetails');
  const nextSteps = document.getElementById('inlineNextSteps');
  const actions = document.getElementById('inlineActions');
  actions.innerHTML = '';

  // ── handle unexpected JSON string ──
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch (e) { data = { success: false, error: true, message: data }; }
  }
  if (!data || typeof data !== 'object') {
    data = { success: false, error: true, message: 'Invalid response from server' };
  }

  // ─── ui block يأخذ الأولوية الكاملة ───
  if (data.ui && typeof data.ui === 'object') {
    if (data.ui.variant === 'success') {
      localStorage.removeItem(`clarification_${appId}`);
      localStorage.removeItem('grantApplicationId');
      localStorage.removeItem('grantUserEmail');
    }
    box.innerHTML = renderUiBlock(data.ui);
    box.className = 'rounded-xl animate-fade-in';
    box.classList.remove('hidden');
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }


  const responseData = getResponseData(data);
  const shouldHide = (responseData.success === true && 
    (responseData.committee_notified === true || responseData.status === 'received')) ||
    (responseData.ui?.variant === 'success');
  if (shouldHide) {
    localStorage.removeItem(`clarification_${appId}`);
    localStorage.removeItem('grantApplicationId');
    localStorage.removeItem('grantUserEmail');
  }

  if (shouldHide) {
    box.className = 'rounded-xl p-6 border-2 bg-emerald-50 border-emerald-200 animate-fade-in';
    icon.className = 'w-20 h-20 rounded-full bg-white flex items-center justify-center mx-auto mb-4 shadow';
    icon.innerHTML = '<svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
    title.textContent = 'Answers Submitted Successfully';
    body.textContent = getPrimaryMessage(responseData, 'Your answers have been received successfully.');

   details.innerHTML = `
  <div class="flex justify-between border-b border-slate-100 py-2">
    <span class="text-slate-500 text-sm">Application ID</span>
    <span class="text-slate-700 text-sm font-mono font-bold">${responseData.application_id || 'N/A'}</span>
  </div>
  <div class="flex justify-between py-2">
    <span class="text-slate-500 text-sm">Status</span>
    <span class="text-emerald-600 text-sm font-bold">${responseData.status || 'Under Review'}</span>
  </div>
`;
    details.classList.remove('hidden');

    document.getElementById('questionsContainer').classList.add('hidden');
    document.getElementById('submitBtn').classList.add('hidden');
    document.getElementById('progressBar').parentElement.classList.add('hidden');
    document.getElementById('progressText').classList.add('hidden');

    actions.innerHTML = '<p class="text-emerald-600 text-sm font-semibold">✓ You may close this page.</p>';
    actions.classList.remove('hidden');

    box.classList.remove('hidden');
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }

  const isSuccess = responseData.success === true;
  const isRejection = responseData.success === false && (responseData.status === 'rejected' || responseData.rejection_code);
  const isCooldown = responseData.error_code === 'COOLDOWN_PERIOD_ACTIVE' || responseData.error_code === 'REJECTION_LIMIT_REACHED';
  const isError = responseData.error === true && !isRejection && !isCooldown;

  if (shouldHide) {
    // Hide only on confirmed success
    document.getElementById('questionsContainer').classList.add('hidden');
    document.getElementById('submitBtn').classList.add('hidden');
    document.getElementById('progressBar').parentElement.classList.add('hidden');
    document.getElementById('progressText').classList.add('hidden');
  } else {
    // Keep form visible on error or rejection
    document.getElementById('questionsContainer').classList.remove('hidden');
    document.getElementById('submitBtn').classList.remove('hidden');
    document.getElementById('progressBar').parentElement.classList.remove('hidden');
    document.getElementById('progressText').classList.remove('hidden');

    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    document.getElementById('spinner').classList.add('hidden');
    document.getElementById('btnText').textContent = 'Retry';

    btn.classList.remove('gradient-bg');
    btn.classList.add('bg-amber-600', 'hover:bg-amber-700');
  }

  let cardClass, iconSvg, titleText, messageText, btnHtml;

  if (isSuccess) {
    cardClass = 'bg-emerald-50 border-emerald-200';
    iconSvg = '<svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
    titleText = responseData.message || 'Answers Submitted Successfully';
    messageText = getPrimaryMessage(responseData, 'Your application has been received.');
    btnHtml = `<p class="text-emerald-600 text-sm font-semibold mt-2">
                 ✓ Your answers have been recorded. You may close this page.
               </p>`;
  } else if (isRejection) {
    cardClass = 'bg-red-50 border-red-200';
    iconSvg = '<svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
    titleText = responseData.message || 'Application Rejected';
    messageText = getPrimaryMessage(responseData, 'Your application was not accepted.');
    btnHtml = `
      <button onclick="window.location.reload()" class="px-6 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition font-bold shadow">Try Again</button>
      <button onclick="window.history.back()" class="px-6 py-3 bg-slate-200 text-slate-700 rounded-xl hover:bg-slate-300 transition font-bold">Back</button>
    `;
  } else if (isCooldown) {
    cardClass = 'bg-amber-50 border-amber-200';
    iconSvg = '<svg class="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
    titleText = responseData.message || 'Cooldown Period Active';
    messageText = getPrimaryMessage(responseData, 'You cannot apply right now.');
    btnHtml = `<button onclick="window.location.reload()" class="px-6 py-3 bg-amber-500 text-white rounded-xl hover:bg-amber-600 transition font-bold shadow">Check Again</button>`;
  } else {
    cardClass = 'bg-amber-50 border-amber-200';
    iconSvg = '<svg class="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
    titleText = 'System Error';
    messageText = getPrimaryMessage(responseData, 'Your answers were not sent. Our technical team has been notified. You can click "Retry" later.');
    btnHtml = `<button onclick="document.getElementById('submitBtn').click()" class="px-6 py-3 bg-amber-600 text-white rounded-xl hover:bg-amber-700 transition font-bold shadow">Retry</button>`;
  }

  // ── build additional details from important fields ──
  let detailsHtml = '';
  const priorityKeys = [
    'application_id', 'status', 'error_code', 'rejection_code', 'stage', 
    'total_rejections', 'effective_rejections', 'days_remaining', 
    'next_eligible_date', 'eligible_after', 'next_reapply_date',
    'previous_application_id', 'previous_approved_application',
    'rejected_at', 'scored_at', 'tier', 'total_score',
    'committee_notified', 'applicant_notified'
  ];
  const detailSource = getDetailSource(responseData);
  const allKeys = [...new Set([...priorityKeys, ...Object.keys(detailSource)])];
const skipKeys = [
  'success', 'error', 'message', 'reason', 'next_steps',
  'raw_response', 'html', 'content', 'report', 'body'
];

  for (const key of allKeys) {
    if (detailSource[key] === undefined || detailSource[key] === null) continue;
    if (skipKeys.includes(key)) continue;

    let value = detailSource[key];
    let label = translateKey(key);

    if (key.includes('date') || key.includes('_at')) {
      try { value = new Date(value).toLocaleString('en-US'); } catch(e) {}
    }
    if (key.includes('amount') || key.includes('budget') || key.includes('funding')) {
      const num = parseFloat(value);
      if (!isNaN(num) && num > 0) value = '$' + num.toLocaleString();
    }
    if (typeof value === 'object') {
      value = JSON.stringify(value).substring(0, 200);
    }

    const isImportant = ['error_code', 'rejection_code', 'total_rejections', 'days_remaining'].includes(key);
    const valueClass = isImportant ? 'font-bold text-red-700' : 'text-slate-700';

    detailsHtml += `
      <div class="flex justify-between border-b border-slate-100 py-2 last:border-0">
        <span class="text-slate-500 text-sm">${escHtml(label)}</span>
        <span class="${valueClass} text-sm font-mono text-right">${escHtml(String(value))}</span>
      </div>`;
  }

  // ── apply colors and content ──
  box.className = 'rounded-xl p-6 border-2 animate-fade-in ' + cardClass;
  icon.className = 'w-20 h-20 rounded-full bg-white flex items-center justify-center mx-auto mb-4 shadow';
  icon.innerHTML = iconSvg;
  title.textContent = titleText;
  body.textContent = messageText;

  if (detailsHtml) {
    details.innerHTML = detailsHtml;
    details.classList.remove('hidden');
  } else {
    details.classList.add('hidden');
    details.innerHTML = '';
  }

  if (data.next_steps) {
    nextSteps.innerHTML = `<p class="text-amber-800 text-sm font-bold">Next steps:</p><p class="text-amber-700 text-sm mt-1">${escHtml(data.next_steps)}</p>`;
    nextSteps.classList.remove('hidden');
  } else {
    nextSteps.classList.add('hidden');
    nextSteps.innerHTML = '';
  }

  actions.innerHTML = btnHtml;
  actions.classList.remove('hidden');

  box.classList.remove('hidden');
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function translateKey(key) {
  const translations = {
    application_id: 'Application ID',
    status: 'Status',
    error_code: 'Error Code',
    rejection_code: 'Rejection Code',
    stage: 'Stage',
    total_rejections: 'Total Rejections',
    effective_rejections: 'Effective Rejections',
    days_remaining: 'Days Remaining',
    next_eligible_date: 'Next Eligible Date',
    eligible_after: 'Eligible After',
    next_reapply_date: 'Next Reapply Date',
    previous_application_id: 'Previous Application ID',
    previous_approved_application: 'Previous Approved Application',
    rejected_at: 'Rejected At',
    scored_at: 'Scored At',
    tier: 'Tier',
    total_score: 'Total Score',
    committee_notified: 'Committee Notified',
    applicant_notified: 'Applicant Notified',
    workflow_version: 'Workflow Version',
    clarification_round: 'Clarification Round'
  };
  return translations[key] || key.replace(/_/g, ' ');
}

function hideInlineMessage() {
  document.getElementById('inlineMessage').classList.add('hidden');
}

function resetButtonState() {
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  btn.classList.remove('bg-amber-600', 'hover:bg-amber-700', 'bg-red-600', 'hover:bg-red-700');
  btn.classList.add('gradient-bg');
  btnText.textContent = 'Submit Answers';
  spinner.classList.add('hidden');
  btn.disabled = false;
}

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// VALIDATE ANSWERS
// ═══════════════════════════════════════════════════════
function validateAnswers() {
  const errors = [];
  document.querySelectorAll('textarea[data-index]').forEach(ta => {
    const index = parseInt(ta.getAttribute('data-index'));
    const length = ta.value.trim().length;
    const card = ta.closest('.question-card');
    const validationMsg = card.querySelector('.validation-msg');

    if (length < MIN_ANSWER_LENGTH) {
      errors.push({ index: index + 1, length: length });
      validationMsg.classList.remove('hidden');
      ta.classList.add('border-red-300');
      ta.classList.remove('border-slate-200');
    } else {
      validationMsg.classList.add('hidden');
      ta.classList.remove('border-red-300');
      ta.classList.add('border-slate-200');
    }
  });
  return errors;
}

// ═══════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════
document.getElementById('clarificationForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideInlineMessage();
  resetButtonState();

  const validationErrors = validateAnswers();
  if (validationErrors.length > 0) {
    renderResponse({
      success: false,
      error: true,
      error_code: 'VALIDATION_ERROR',
      message: 'Incomplete Answers',
      reason: `Please complete all answers. ${validationErrors.length} question(s) need a longer response (at least ${MIN_ANSWER_LENGTH} characters).`,
      status: 'validation_failed'
    });
    return;
  }

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');

  btn.disabled = true;
  spinner.classList.remove('hidden');
  btnText.textContent = 'Submitting...';

  const answers = [];
  document.querySelectorAll('textarea[data-index]').forEach((ta, i) => {
    answers.push({
      question: ta.getAttribute('data-question') || `Question ${i + 1}`,
      answer: ta.value.trim()
    });
  });

  const userEmail = params.get('email') || 
                    localStorage.getItem('grantUserEmail') || '';

  const payload = {
    application_id: appId,
    clarification_round: parseInt(round),
    answers: answers,
    email: userEmail,
    received_at: new Date().toISOString()
  };

  async function trySubmit(attempt = 1) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT);

    try {
      const res = await fetch(SUBMIT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
          'X-Webhook-Secret': WEBHOOK_SECRET,
          'x-webhook-signature': signatureHex
        },
        body: bodyString,
        signal: controller.signal
      });
      clearTimeout(timeoutId);

      if (!res.ok) {
        if (detectAIError(res)) {
          return { ok: false, data: {
            success: false,
            error: true,
            error_code: 'AI_SERVICE_ERROR',
            message: 'AI service temporarily unavailable. Our team has been notified.',
            status: 'ai_error'
          }};
        }

        const errText = await res.text();
        reportError('HTTP', `Server error ${res.status}`, {
          description: errText.substring(0, 200),
          status: res.status,
          payload: payload
        });
        let errMsg = 'Server error ' + res.status;
        try {
          const errJson = JSON.parse(errText);
          errMsg = errJson.message || errJson.error_code || errMsg;
          return { ok: false, data: errJson };
        } catch(_) {
          return { ok: false, data: { success: false, error: true, message: errMsg, error_code: `HTTP_${res.status}` } };
        }
      }

  const text = await res.text();
let data;

try {
  data = JSON.parse(text);
} catch(e) {
  // Response is not valid JSON
  reportError('PARSE_ERROR', 'Invalid JSON from server', {
    description: text.substring(0, 300),
    status: res.status
  });
  return { 
    ok: false, 
    data: { 
      success: false, 
      error: true, 
      error_code: 'INVALID_RESPONSE',
      message: 'Server returned an invalid response. Your answers were saved. Please contact support if needed.',
      status: 'parse_error'
    } 
  };
}

// If the response only contains raw_response
if (data.raw_response && !data.success && !data.error_code) {
  reportError('RAW_RESPONSE', 'Server returned raw_response', {
    description: data.raw_response,
    applicationId: appId
  });
  return {
    ok: true,  // treat as success since data arrived
    data: {
      success: true,
      message: 'Your answers have been received successfully.',
      application_id: appId,
      status: 'received'
    }
  };
}

return { ok: true, data: data };

    } catch (err) {
      clearTimeout(timeoutId);

      reportError('NETWORK', err.message || 'Network error', {
        description: err.stack || String(err),
        payload: payload
      });

      if (attempt < MAX_RETRIES && (err.name === 'AbortError' || err.name === 'TypeError')) {
        btnText.textContent = `Retrying (${attempt}/${MAX_RETRIES})...`;
        await new Promise(r => setTimeout(r, 2500));
        return trySubmit(attempt + 1);
      }

      return { 
        ok: false, 
        data: { 
          success: false, 
          error: true, 
          error_code: err.name || 'NETWORK_ERROR',
          message: err.name === 'AbortError' 
            ? 'Request timed out. The server is taking too long. Please try again later.' 
            : (err.message || 'Network connection failed.'),
          status: 'network_error'
        } 
      };
    }
  }

  const result = await trySubmit(1);
  const data = result.data;

  // ═══════════════════════════════════════════════════════
  // Always show the dynamic response
  // ═══════════════════════════════════════════════════════
  renderResponse(data);

  btn.disabled = false;
  spinner.classList.add('hidden');
  btnText.textContent = 'Submit Answers';
});

function escHtml(t) {
  if (!t) return '';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

loadQuestions();
</script>
