<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grant Portal - New Application</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #059669 0%, #0d9488 100%); }
    .glass-effect { backdrop-filter: blur(10px); background: rgba(255,255,255,0.95); }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-4xl glass-effect rounded-2xl shadow-2xl overflow-hidden border border-white/50">

  <!-- Header -->
  <div class="gradient-bg px-8 py-8 text-center">
    <h1 class="text-3xl font-bold text-white mb-2">Smart Grant Portal</h1>
    <p class="text-emerald-100 text-sm">Submit a grant application for community-impact projects</p>
  </div>

  <!-- Form -->
  <form id="grantForm" class="p-8 space-y-6">
    
    <!-- Personal Info -->
    <div class="grid md:grid-cols-2 gap-5">
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Full Name *</label>
        <input type="text" name="name" required 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
          placeholder="John Doe">
      </div>
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Email Address *</label>
        <input type="email" name="email" required 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
          placeholder="example@email.com">
      </div>
    </div>

    <!-- Organization -->
    <div class="grid md:grid-cols-2 gap-5">
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Organization *</label>
        <input type="text" name="organization" required 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
          placeholder="Your organization">
      </div>
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Contact Phone</label>
        <input type="tel" name="contact_phone" 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
          placeholder="+1 234 567 890">
      </div>
    </div>

    <!-- Project Info -->
    <div class="space-y-1">
      <label class="block text-sm font-semibold text-slate-700">Project Title *</label>
      <input type="text" name="project_title" required 
        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
        placeholder="e.g. Solar Wells for Rural Kenya">
    </div>

    <div class="grid md:grid-cols-3 gap-5">
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Sector *</label>
        <select name="sector" required 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80">
          <option value="">Select a sector</option>
          <option value="Environment">Environment</option>
          <option value="Education">Education</option>
          <option value="Health">Health</option>
          <option value="Poverty Alleviation">Poverty Alleviation</option>
          <option value="Technology">Technology</option>
          <option value="Arts & Culture">Arts & Culture</option>
          <option value="General">General</option>
        </select>
      </div>
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Budget Requested (USD) *</label>
        <input type="number" name="budget" required min="1" max="1000000" 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
          placeholder="50000">
        <p class="text-xs text-slate-400">Maximum budget: $1,000,000</p>
      </div>
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Timeline *</label>
        <input type="text" name="timeline" required 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
          placeholder="e.g. 12 months">
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-5">
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Location *</label>
        <input type="text" name="location" required 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
          placeholder="e.g. Tana River County, Kenya">
      </div>
      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Beneficiaries *</label>
        <input type="text" name="beneficiaries" required 
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
          placeholder="e.g. 5,000 rural residents">
      </div>
    </div>

    <div class="space-y-1">
      <label class="block text-sm font-semibold text-slate-700">Previous Funding</label>
      <input type="text" name="previous_funding" 
        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80"
        placeholder="None or previous grants">
    </div>

    <div class="space-y-1">
      <label class="block text-sm font-semibold text-slate-700">Project Description *</label>
      <textarea name="description" required rows="6" minlength="20" 
        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition bg-white/80 resize-none"
        placeholder="Describe your project in detail (minimum 20 characters)..."></textarea>
      <p class="text-xs text-slate-400">Description must be at least 20 characters.</p>
    </div>

    <!-- Response Area -->
    <div id="responseArea" class="hidden rounded-xl p-5 border" aria-live="polite" role="status"></div>

    <!-- Submit Button -->
    <button type="submit" id="submitBtn" 
      class="w-full gradient-bg text-white font-bold py-4 rounded-xl hover:opacity-90 transition flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg">
      <span id="btnText">Submit Application</span>
      <svg id="spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </button>
  </form>

  <!-- Success Result -->
  <div id="successResult" class="hidden px-8 pb-8">
    <div class="bg-emerald-50 border-2 border-emerald-200 rounded-2xl p-8 text-center">
      <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h3 class="text-2xl font-bold text-emerald-800 mb-2">Application Submitted Successfully!</h3>
      <p id="successMessage" class="text-emerald-700 mb-6"></p>
      
      <div class="bg-white border border-emerald-200 rounded-xl p-6 text-left space-y-3">
        <div class="flex justify-between items-center border-b border-slate-100 py-2">
          <span class="text-slate-500">Application ID</span>
          <span id="successAppId" class="font-bold text-slate-800 font-mono text-lg">N/A</span>
        </div>
        <div class="flex justify-between items-center border-b border-slate-100 py-2">
          <span class="text-slate-500">Status</span>
          <span id="successStatus" class="font-bold text-emerald-600">N/A</span>
        </div>
        <div id="successExtraFields" class="space-y-2"></div>
      </div>
      
      <button onclick="resetForm()" class="mt-6 px-6 py-3 bg-emerald-100 text-emerald-700 rounded-xl hover:bg-emerald-200 transition font-semibold">
        Submit Another Application
      </button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const WEBHOOK_URL = 'https://grant-n8n-proxy.mohummadsultan0.workers.dev/app-x7k9m2p-2026-secure';
const WEBHOOK_SECRET = 'grant-prod-2026-secure-key';
const REQUEST_TIMEOUT = 120000;
const MAX_RETRIES = 2;
const FORM_DRAFT_KEY = 'grantApplicationDraft';

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
function escHtml(t) {
  if (t === null || t === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(t);
  return d.innerHTML;
}

function formatDate(value) {
  if (!value) return 'N/A';
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function translateKey(key) {
  const map = {
    application_id: 'Application ID', status: 'Status', error_code: 'Error Code',
    rejection_code: 'Rejection Code', stage: 'Stage', total_rejections: 'Total Rejections',
    days_remaining: 'Days Remaining', next_eligible_date: 'Next Eligible Date',
    tier: 'Tier', total_score: 'Total Score', message: 'Message'
  };
  return map[key] || key.replace(/_/g, ' ');
}

// ═══════════════════════════════════════════════════════
// ERROR REPORTING
// ═══════════════════════════════════════════════════════
async function reportError(type, msg, details) {
  try {
    await fetch('https://grant-n8n-proxy.mohummadsultan0.workers.dev/error-report-x7k9m2p-2026', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Webhook-Secret': WEBHOOK_SECRET },
      body: JSON.stringify({
        error_message: msg, error_description: details?.description || '',
        node_name: 'Frontend_' + type, workflow_name: 'Grant Portal',
        user_email: details?.email || document.querySelector('[name="email"]')?.value || 'Unknown',
        request_url: window.location.href, request_method: 'CLIENT_ERROR'
      })
    });
  } catch(e) { console.error('Failed to report error:', e); }
}

// ═══════════════════════════════════════════════════════
// HMAC
// ═══════════════════════════════════════════════════════
async function generateHMACSignature(bodyString) {
  const encoder = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', encoder.encode(WEBHOOK_SECRET), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, encoder.encode(bodyString));
  return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ═══════════════════════════════════════════════════════
// FORM VALIDATION
// ═══════════════════════════════════════════════════════
function validateForm(data) {
  const errs = [];
  if (!data.name?.trim() || data.name.trim().length < 2) errs.push('Full name required (min 2 chars)');
  if (!data.email?.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) errs.push('Valid email required');
  if (!data.project_title?.trim() || data.project_title.trim().length < 3) errs.push('Project title required');
  if (!data.budget || parseFloat(data.budget) <= 0) errs.push('Budget must be > 0');
  if (parseFloat(data.budget) > 1000000) errs.push('Budget max $1,000,000');
  if (!data.description?.trim() || data.description.trim().length < 20) errs.push('Description min 20 chars');
  if (!data.organization?.trim() || data.organization.trim().length < 2) errs.push('Organization required');
  if (!data.sector) errs.push('Select a sector');
  if (!data.location?.trim() || data.location.trim().length < 2) errs.push('Location required');
  if (!data.beneficiaries?.trim() || data.beneficiaries.trim().length < 2) errs.push('Beneficiaries required');
  if (!data.timeline?.trim() || data.timeline.trim().length < 2) errs.push('Timeline required');
  return errs;
}

// ═══════════════════════════════════════════════════════
// UI RENDERING (مقاوم للأخطاء)
// ═══════════════════════════════════════════════════════
function resetButtonState() {
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  if (btn) btn.disabled = false;
  if (spinner) spinner.classList.add('hidden');
  if (btnText) btnText.textContent = 'Submit Application';
}

function hideResponse() {
  const area = document.getElementById('responseArea');
  if (area) { area.classList.add('hidden'); area.innerHTML = ''; }
}

function showResponse(rawData) {
  const area = document.getElementById('responseArea');
  if (!area) return;
  
  let data = rawData;
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch(e) { data = { success: false, error: true, message: data }; }
  }
  if (!data || typeof data !== 'object') {
    data = { success: false, error: true, message: 'Invalid server response' };
  }

  // ─── استخراج الرسالة من أي مكان ───
  const msg = data.message || data.errorMessage || data.error_message || data.reason || data.status || 'Unknown error';
  const code = data.error_code || data.errorCode || data.code || (data.error ? 'ERROR' : 'OK');
  const isSuccess = data.success === true;
  const isError = data.error === true || (!isSuccess && !data.ui);

  let html = '';
  let cardClass = '';

  if (data.ui && typeof data.ui === 'object') {
    // ─── UI Block من السيرفر ───
    const v = data.ui.variant || 'info';
    const colors = {
      success: { card: 'bg-emerald-50 border-emerald-200', icon: 'text-emerald-600', title: 'text-emerald-800', body: 'text-emerald-700' },
      error: { card: 'bg-red-50 border-red-200', icon: 'text-red-600', title: 'text-red-800', body: 'text-red-700' },
      warning: { card: 'bg-amber-50 border-amber-200', icon: 'text-amber-600', title: 'text-amber-800', body: 'text-amber-700' },
      info: { card: 'bg-blue-50 border-blue-200', icon: 'text-blue-600', title: 'text-blue-800', body: 'text-blue-700' },
      blocked: { card: 'bg-red-900 border-red-700', icon: 'text-red-100', title: 'text-red-100', body: 'text-red-200' }
    };
    const c = colors[v] || colors.info;
    cardClass = c.card;
    
    let detailsHtml = '';
    if (data.ui.details) {
      const entries = Object.entries(data.ui.details).map(([k, v]) => ({ label: k.replace(/_/g, ' '), value: v }));
      detailsHtml = entries.map(({ label, value }) => `
        <div class="flex justify-between border-b border-slate-100 py-2 last:border-0">
          <span class="text-slate-500 text-sm">${escHtml(label)}</span>
          <span class="text-slate-700 text-sm font-mono text-right">${escHtml(String(value ?? ''))}</span>
        </div>`).join('');
    }
    
    html = `
      <div class="flex items-start gap-3">
        <div class="flex-shrink-0 w-12 h-12 rounded-full bg-white/80 flex items-center justify-center shadow">
          <svg class="w-10 h-10 ${c.icon}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <div class="flex-1 min-w-0">
          <h4 class="font-bold text-base ${c.title}">${escHtml(data.ui.title || '')}</h4>
          <p class="text-sm mt-1 ${c.body}">${escHtml(data.ui.message || msg)}</p>
          ${detailsHtml ? `<div class="mt-3 bg-white/70 rounded-lg p-3 border border-slate-200/60">${detailsHtml}</div>` : ''}
          ${data.ui.note ? `<div class="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-3"><p class="text-amber-700 text-sm">${escHtml(data.ui.note)}</p></div>` : ''}
        </div>
      </div>`;
  } else if (isSuccess) {
    cardClass = 'bg-emerald-50 border-emerald-200';
    html = `
      <div class="flex items-start gap-3">
        <div class="flex-shrink-0 w-12 h-12 rounded-full bg-white/80 flex items-center justify-center shadow">
          <svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <div class="flex-1">
          <h4 class="font-bold text-base text-emerald-800">Success</h4>
          <p class="text-sm mt-1 text-emerald-700">${escHtml(msg)}</p>
        </div>
      </div>`;
  } else {
    cardClass = isError ? 'bg-red-50 border-red-300' : 'bg-blue-50 border-blue-300';
    const titleColor = isError ? 'text-red-800' : 'text-blue-800';
    const bodyColor = isError ? 'text-red-700' : 'text-blue-700';
    
    // ─── تفاصيل آمنة ───
    let detailsHtml = '';
    const safeKeys = ['application_id', 'status', 'error_code', 'rejection_code', 'stage', 'total_rejections', 'days_remaining', 'next_eligible_date', 'tier', 'total_score'];
    for (const key of safeKeys) {
      if (data[key] === undefined || data[key] === null) continue;
      let val = data[key];
      if (key.includes('date') || key.includes('_at')) val = formatDate(val);
      detailsHtml += `
        <div class="flex justify-between border-b border-slate-100 py-2 last:border-0">
          <span class="text-slate-500 text-sm">${escHtml(translateKey(key))}</span>
          <span class="text-slate-700 text-sm font-mono text-right">${escHtml(String(val))}</span>
        </div>`;
    }
    
    html = `
      <div class="flex items-start gap-3">
        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-white/80 flex items-center justify-center shadow">
          <svg class="w-6 h-6 ${isError ? 'text-red-600' : 'text-blue-600'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <div class="flex-1 min-w-0">
          <h4 class="font-bold text-base ${titleColor}">${escHtml(isError ? 'Error' : 'Notice')}</h4>
          <p class="text-sm mt-1 ${bodyColor}">${escHtml(msg)}</p>
          ${detailsHtml ? `<div class="mt-3 bg-white/70 rounded-lg p-3 border border-slate-200/60">${detailsHtml}</div>` : ''}
        </div>
      </div>`;
  }

  area.className = `rounded-xl p-5 border-2 ${cardClass}`;
  area.innerHTML = html;
  area.classList.remove('hidden');
  area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderSuccess(data, payload) {
  const form = document.getElementById('grantForm');
  const success = document.getElementById('successResult');
  if (form) form.classList.add('hidden');
  if (success) success.classList.remove('hidden');

  const appId = document.getElementById('successAppId');
  const status = document.getElementById('successStatus');
  const msg = document.getElementById('successMessage');
  const extra = document.getElementById('successExtraFields');
  
  if (appId) appId.textContent = data.application_id || 'N/A';
  if (status) {
    status.textContent = data.status || 'Received';
    status.className = 'font-bold text-emerald-600';
  }
  if (msg) msg.textContent = data.message || 'Your application has been received.';
  
  if (extra) {
    extra.innerHTML = '';
    const skip = ['success', 'error', 'error_code', 'application_id', 'status', 'message', 'ui'];
    Object.entries(data).filter(([k]) => !skip.includes(k)).forEach(([k, v]) => {
      const row = document.createElement('div');
      row.className = 'flex justify-between items-start border-b border-slate-100 py-2 last:border-0';
      row.innerHTML = `<span class="text-slate-500 mr-4">${escHtml(translateKey(k))}</span><span class="font-bold text-slate-800 text-right break-all">${escHtml(String(v ?? 'N/A'))}</span>`;
      extra.appendChild(row);
    });
  }
  
  localStorage.setItem('grantUserEmail', payload?.email || '');
  localStorage.setItem('grantApplicationId', data?.application_id || '');
}

function resetForm() {
  if (!confirm('Are you sure? All entered data will be cleared.')) return;
  document.getElementById('grantForm')?.reset();
  document.getElementById('grantForm')?.classList.remove('hidden');
  document.getElementById('successResult')?.classList.add('hidden');
  hideResponse();
  resetButtonState();
}

// ═══════════════════════════════════════════════════════
// DRAFT AUTO-SAVE
// ═══════════════════════════════════════════════════════
(function initDraft() {
  const saved = sessionStorage.getItem(FORM_DRAFT_KEY);
  if (!saved) return;
  try {
    const draft = JSON.parse(saved);
    if (confirm('You have a saved draft. Would you like to restore it?')) {
      Object.keys(draft).forEach(key => {
        const field = document.querySelector(`[name="${key}"]`);
        if (field) field.value = draft[key] || '';
      });
    }
  } catch (e) { sessionStorage.removeItem(FORM_DRAFT_KEY); }
})();

let saveTimer;
document.getElementById('grantForm')?.addEventListener('input', function() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const fd = new FormData(document.getElementById('grantForm'));
    const data = {};
    fd.forEach((v, k) => data[k] = v);
    sessionStorage.setItem(FORM_DRAFT_KEY, JSON.stringify(data));
  }, 500);
});

// ═══════════════════════════════════════════════════════
// SUBMIT HANDLER (مقاوم للتعليق)
// ═══════════════════════════════════════════════════════
document.getElementById('grantForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  
  if (btn) btn.disabled = true;
  if (spinner) spinner.classList.remove('hidden');
  if (btnText) btnText.textContent = 'Submitting...';
  hideResponse();

  // ─── فailsafe: إعادة الزر بعد 130 ثانية مهما حدث ───
  const failsafeTimer = setTimeout(() => {
    resetButtonState();
    showResponse({ success: false, error: true, error_code: 'TIMEOUT', message: 'Request is taking too long. Please try again later.' });
  }, 130000);

  const formData = new FormData(e.target);
  const payload = {};
  formData.forEach((v, k) => payload[k] = v);
  payload.budget = parseFloat(payload.budget) || 0;

  const validationErrors = validateForm(payload);
  if (validationErrors.length > 0) {
    clearTimeout(failsafeTimer);
    resetButtonState();
    showResponse({ success: false, error: true, error_code: 'VALIDATION_ERROR', message: validationErrors.join('. ') });
    return;
  }

  async function trySubmit(attempt = 1) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT);

    try {
      const bodyString = JSON.stringify(payload);
      const signatureHex = await generateHMACSignature(bodyString);

      console.log('[Grant] Sending:', WEBHOOK_URL);
      console.log('[Grant] Payload:', payload);

      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'X-Webhook-Secret': WEBHOOK_SECRET,
          'x-webhook-signature': signatureHex
        },
        body: bodyString,
        signal: controller.signal
      });
      
      clearTimeout(timeoutId);
      console.log('[Grant] Status:', res.status);

      const text = await res.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch(e) {
        data = { success: false, error: true, error_code: 'INVALID_RESPONSE', message: 'Server returned invalid JSON.' };
      }
      console.log('[Grant] Response:', data);

      if (!res.ok) {
        if (res.status >= 500) reportError('SERVER', `HTTP ${res.status}`, { description: text.substring(0, 200) });
        return { ok: false, data: { success: false, error: true, error_code: `HTTP_${res.status}`, message: data.message || `Server error: ${res.status}` }};
      }

      return { ok: true, data: data };

    } catch (err) {
      clearTimeout(timeoutId);
      reportError('NETWORK', err.message || 'Network error', { description: err.stack });
      
      if (attempt < MAX_RETRIES && (err.name === 'AbortError' || err.name === 'TypeError')) {
        if (btnText) btnText.textContent = `Retrying (${attempt}/${MAX_RETRIES})...`;
        await new Promise(r => setTimeout(r, 2500));
        return trySubmit(attempt + 1);
      }
      
      return { ok: false, data: { success: false, error: true, error_code: err.name || 'NETWORK_ERROR', message: err.name === 'AbortError' ? 'Request timed out.' : (err.message || 'Network failed.') }};
    }
  }

  try {
    const result = await trySubmit(1);
    const data = result.data;
    
    if (data.success === true) {
      renderSuccess(data, payload);
      sessionStorage.removeItem(FORM_DRAFT_KEY);
    } else {
      showResponse(data);
    }
  } catch (e) {
    console.error('[Grant] Fatal error:', e);
    showResponse({ success: false, error: true, error_code: 'FATAL', message: 'An unexpected error occurred. Please refresh and try again.' });
  } finally {
    clearTimeout(failsafeTimer);
    resetButtonState();
  }
});
</script>
